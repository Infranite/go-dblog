name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Install tools
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Lint all modules
        run: golangci-lint run ./... ./mysql/... ./mongo/... ./postgres/... ./redis/...

      - name: Vet all modules
        run: go vet ./... ./mysql/... ./mongo/... ./postgres/... ./redis/...

      - name: Scan vulnerabilities
        run: govulncheck ./... ./mysql/... ./mongo/... ./postgres/... ./redis/...

      - name: Test root module
        run: go test -short -race -count=1 ./...

      - name: Test backend modules
        run: |
          for module in mysql mongo postgres redis; do
            (cd "$module" && GOWORK=off go test -short -race -count=1 ./...)
          done

  mysql:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        mysql-image:
          - mysql:5.6
          - mysql:5.7
          - mysql:8.0
          - mysql:8.4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Generate MySQL binlog fixture
        run: ./mysql/test/testdata/generate_mysql_binlog.sh "${{ matrix.mysql-image }}"

      - name: Test MySQL module
        run: cd mysql && GOWORK=off go test -race -count=1 ./...

      - name: Benchmark MySQL fixture decoder
        if: matrix.mysql-image == 'mysql:8.4'
        run: cd mysql && GOWORK=off go test -run '^$' -bench=BenchmarkDecoder -benchmem -benchtime=100x ./test -v

  mongo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Generate MongoDB oplog fixture
        run: ./mongo/testdata/generate_mongo_oplog.sh mongo:7.0

      - name: Test MongoDB module
        run: cd mongo && GOWORK=off go test -race -count=1 ./...

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Generate PostgreSQL logical decoding fixture
        run: ./postgres/testdata/generate_postgres_logical.sh postgres:16

      - name: Test PostgreSQL module
        run: cd postgres && GOWORK=off go test -race -count=1 ./...

  redis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: false

      - name: Generate Redis AOF fixture
        run: ./redis/testdata/generate_redis_aof.sh redis:7.2

      - name: Test Redis module
        run: cd redis && GOWORK=off go test -race -count=1 ./...

  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [unit, mysql, mongo, postgres, redis]
    if: always()
    steps:
      - name: Require all CI jobs
        run: |
          test "${{ needs.unit.result }}" = "success"
          test "${{ needs.mysql.result }}" = "success"
          test "${{ needs.mongo.result }}" = "success"
          test "${{ needs.postgres.result }}" = "success"
          test "${{ needs.redis.result }}" = "success"
