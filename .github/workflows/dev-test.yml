name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mysql-image:
          - mysql:5.6
          - mysql:5.7
          - mysql:8.0
          - mysql:8.4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Test root module
        run: go test ./...

      - name: Generate MySQL binlog fixture
        run: ./mysql/test/testdata/generate_mysql_binlog.sh "${{ matrix.mysql-image }}"

      - name: Test MySQL module
        run: go test ./mysql/...
