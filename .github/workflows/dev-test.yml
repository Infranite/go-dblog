name: CI

on:
  pull_request:
    branches: [master]
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:
    types: [checks_requested]
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.23"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: root
            path: .
          - module: mysql
            path: mysql
          - module: mongo
            path: mongo
          - module: postgres
            path: postgres
          - module: redis
            path: redis
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.8.0

      - name: Lint module
        working-directory: ${{ matrix.path }}
        env:
          GOWORK: off
        run: $(go env GOPATH)/bin/golangci-lint run ./...

  vet:
    name: vet (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: root
            path: .
          - module: mysql
            path: mysql
          - module: mongo
            path: mongo
          - module: postgres
            path: postgres
          - module: redis
            path: redis
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Vet module
        working-directory: ${{ matrix.path }}
        env:
          GOWORK: off
        run: go vet ./...

  vuln:
    name: vuln (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: root
            path: .
          - module: mysql
            path: mysql
          - module: mongo
            path: mongo
          - module: postgres
            path: postgres
          - module: redis
            path: redis
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Scan vulnerabilities
        working-directory: ${{ matrix.path }}
        env:
          GOWORK: off
        run: $(go env GOPATH)/bin/govulncheck ./...

  root_test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Test root module
        run: go test -short -race -count=1 ./...

  backend_short:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        module: [mysql, mongo, postgres, redis]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Test backend module
        run: cd "${{ matrix.module }}" && GOWORK=off go test -short -race -count=1 ./...

  mysql:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        mysql-image:
          - mysql:5.6
          - mysql:5.7
          - mysql:8.0
          - mysql:8.4
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Generate MySQL binlog fixture
        run: ./mysql/test/testdata/generate_mysql_binlog.sh "${{ matrix.mysql-image }}"

      - name: Test MySQL module
        run: cd mysql && GOWORK=off go test -race -count=1 ./...

      - name: Benchmark MySQL fixture decoder
        if: matrix.mysql-image == 'mysql:8.4'
        run: cd mysql && GOWORK=off go test -run '^$' -bench=BenchmarkDecoder -benchmem -benchtime=100x ./test -v

  mongo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Generate MongoDB oplog fixture
        run: ./mongo/testdata/generate_mongo_oplog.sh mongo:7.0

      - name: Test MongoDB module
        run: cd mongo && GOWORK=off go test -race -count=1 ./...

  postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Generate PostgreSQL logical decoding fixture
        run: ./postgres/testdata/generate_postgres_logical.sh postgres:16

      - name: Test PostgreSQL module
        run: cd postgres && GOWORK=off go test -race -count=1 ./...

  redis:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: false

      - name: Generate Redis AOF fixture
        run: ./redis/testdata/generate_redis_aof.sh redis:7.2

      - name: Test Redis module
        run: cd redis && GOWORK=off go test -race -count=1 ./...

  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [lint, vet, vuln, root_test, backend_short, mysql, mongo, postgres, redis]
    if: always()
    steps:
      - name: Require all CI jobs
        run: |
          test "${{ needs.lint.result }}" = "success"
          test "${{ needs.vet.result }}" = "success"
          test "${{ needs.vuln.result }}" = "success"
          test "${{ needs.root_test.result }}" = "success"
          test "${{ needs.backend_short.result }}" = "success"
          test "${{ needs.mysql.result }}" = "success"
          test "${{ needs.mongo.result }}" = "success"
          test "${{ needs.postgres.result }}" = "success"
          test "${{ needs.redis.result }}" = "success"
