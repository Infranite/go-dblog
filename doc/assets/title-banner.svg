<svg width="1280" height="460" viewBox="0 0 1280 460" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">go-dblog</title>
  <desc id="desc">High-performance database log parsing for Go.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#101319"/>
      <stop offset=".48" stop-color="#12161f"/>
      <stop offset="1" stop-color="#171b23"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#ffffff" stroke-opacity=".04"/>
    </pattern>
    <filter id="panelShadow" x="706" y="38" width="546" height="424" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="460" rx="10" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="460" rx="10" fill="url(#grid)"/>
  <rect x="718" y="0" width="12" height="460" fill="#24d3ee" fill-opacity=".08"/>
  <path d="M0 0H1280V460H0V0Z" fill="url(#grid)"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="54" y="130" fill="#aab5c4" font-size="13" font-weight="800" letter-spacing="1.2">DATABASE LOG TOOLKIT</text>

    <text x="54" y="208" fill="#f8fbff" font-size="64" font-weight="860">go-dblog</text>
    <text x="54" y="258" fill="#d7dee8" font-size="25" font-weight="650">High-performance database log parsing for Go.</text>
    <text x="54" y="294" fill="#d7dee8" font-size="25" font-weight="650">Built for CDC and recovery workflows.</text>

    <g font-size="13" font-weight="760">
      <rect x="54" y="318" width="106" height="36" rx="6" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".20"/>
      <text x="66" y="341" fill="#e9eef5">MySQL family</text>

      <rect x="172" y="318" width="126" height="36" rx="6" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".20"/>
      <text x="184" y="341" fill="#e9eef5">Plugin Support</text>

      <rect x="310" y="318" width="92" height="36" rx="6" fill="#ffffff" fill-opacity=".055" stroke="#ffffff" stroke-opacity=".20"/>
      <text x="322" y="341" fill="#48e08a">CDC</text>
      <text x="354" y="341" fill="#e9eef5">ready</text>
    </g>

    <g filter="url(#panelShadow)">
      <rect x="744" y="40" width="482" height="400" rx="10" fill="#070a0f" fill-opacity=".78" stroke="#ffffff" stroke-opacity=".20"/>
      <line x1="744" y1="84" x2="1226" y2="84" stroke="#ffffff" stroke-opacity=".12"/>
      <text x="760" y="69" fill="#aab5c4" font-size="12" font-weight="800" letter-spacing="1.1">EVENT STREAM</text>
      <circle cx="1176" cy="64" r="4.5" fill="#ff7a7a"/>
      <circle cx="1191" cy="64" r="4.5" fill="#f7c948"/>
      <circle cx="1206" cy="64" r="4.5" fill="#48e08a"/>

      <g font-family="SFMono-Regular, Consolas, Liberation Mono, monospace" font-size="13" font-weight="800">
        <rect x="762" y="102" width="428" height="42" rx="7" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".08"/>
        <rect x="774" y="108" width="10" height="30" rx="3" fill="#24d3ee"/>
        <text x="796" y="128" fill="#f5f8fc">FORMAT_DESCRIPTION</text>
        <text x="1162" y="128" fill="#aab5c4">v4</text>

        <rect x="762" y="154" width="428" height="42" rx="7" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".08"/>
        <rect x="774" y="160" width="10" height="30" rx="3" fill="#48e08a"/>
        <text x="796" y="180" fill="#f5f8fc">TABLE_MAP</text>
        <text x="1140" y="180" fill="#aab5c4">schema</text>

        <rect x="762" y="206" width="428" height="42" rx="7" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".08"/>
        <rect x="774" y="212" width="10" height="30" rx="3" fill="#f7c948"/>
        <text x="796" y="232" fill="#f5f8fc">WRITE_ROWS_V2</text>
        <text x="1152" y="232" fill="#aab5c4">rows</text>

        <rect x="762" y="258" width="428" height="42" rx="7" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".08"/>
        <rect x="774" y="264" width="10" height="30" rx="3" fill="#a78bfa"/>
        <text x="796" y="284" fill="#f5f8fc">GTID_TAGGED_LOG</text>
        <text x="1162" y="284" fill="#aab5c4">8.4</text>

        <rect x="762" y="310" width="428" height="42" rx="7" fill="#ffffff" fill-opacity=".045" stroke="#ffffff" stroke-opacity=".08"/>
        <rect x="774" y="316" width="10" height="30" rx="3" fill="#ff7a7a"/>
        <text x="796" y="336" fill="#f5f8fc">MARIADB_GTID_LIST</text>
        <text x="1158" y="336" fill="#aab5c4">10.x</text>
      </g>

      <line x1="744" y1="360" x2="1226" y2="360" stroke="#ffffff" stroke-opacity=".12"/>

      <g font-size="12" font-weight="850" text-anchor="middle">
        <rect x="762" y="374" width="108" height="44" rx="8" fill="#ffffff" fill-opacity=".04" stroke="#ffffff" stroke-opacity=".12"/>
        <text x="816" y="401" fill="#e9eef5">binlog file</text>

        <text x="900" y="404" fill="#24d3ee" font-size="24" font-weight="900">&gt;</text>

        <rect x="928" y="374" width="108" height="44" rx="8" fill="#ffffff" fill-opacity=".04" stroke="#ffffff" stroke-opacity=".12"/>
        <text x="982" y="401" fill="#e9eef5">decoder</text>

        <text x="1066" y="404" fill="#24d3ee" font-size="24" font-weight="900">&gt;</text>

        <rect x="1094" y="374" width="108" height="44" rx="8" fill="#ffffff" fill-opacity=".04" stroke="#ffffff" stroke-opacity=".12"/>
        <text x="1148" y="401" fill="#e9eef5">typed events</text>
      </g>
